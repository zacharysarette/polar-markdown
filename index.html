<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polar Markdown</title>
    <script>
      (function() {
        var theme = localStorage.getItem('polar-markdown:theme') || 'aurora';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <style>
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1b26;
        transition: opacity 0.5s ease;
      }
      [data-theme="glacier"] #splash {
        background: #f4f7fb;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 128px;
        height: 128px;
        animation: pulse 2s ease-in-out infinite;
      }
      #splash h1 {
        margin: 24px 0 0 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 28px;
        font-weight: 600;
        color: #7aa2f7;
        letter-spacing: 1px;
      }
      [data-theme="glacier"] #splash h1 {
        color: #4a8dbf;
      }
      .splash-dots {
        display: flex;
        gap: 8px;
        margin-top: 24px;
      }
      .splash-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #7aa2f7;
        animation: bounce 1.4s ease-in-out infinite;
      }
      [data-theme="glacier"] .splash-dots span {
        background: #4a8dbf;
      }
      .splash-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .splash-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.85; }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-12px); }
      }
    </style>
  </head>
